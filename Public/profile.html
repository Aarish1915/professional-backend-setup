<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile & Watch History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>User Profile & Watch History</h1>
    <div class="panel">
      <button id="homeBtn">Back to API Tester</button>
    </div>

    <section class="panel">
      <h2>Your Profile</h2>
      <button id="loadProfileBtn">Load Profile</button>
      <pre id="profileArea">No profile loaded</pre>
    </section>

    <section class="panel">
      <h2>Watch History</h2>
      <button id="loadHistoryBtn">Load Watch History</button>
      <div id="historyList"></div>
    </section>

    <section class="panel">
      <h2>Add to Watch History</h2>
      <input id="historyVideoId" placeholder="Video ID" />
      <button id="addHistoryBtn">Add Video to History</button>
    </section>

    <section class="panel">
      <h2>Debug</h2>
      <pre id="resultArea">Ready</pre>
    </section>
  </div>

  <script src="profile.js"></script>
</body>
</html>
